<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clean Water Caravan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header with logo -->
  <header>
    <img src="img/cw_logo_horizontal.png" alt="charity: water logo" class="header-logo">
  </header>

  <!-- Title -->
  <h1>💧 Clean Water Caravan</h1>

  <!-- Game Info -->
  <div id="info">
    <p id="score">Score: 0</p>
    <p id="people">People Served: 0</p>
    <p id="timer">Time: 30</p>
  </div>

  <!-- Game Area -->
  <div id="game-area"></div>

  <!-- Buttons -->
  <div id="controls">
    <button id="start-btn">Start Game</button>
    <button id="reset-btn">Reset</button>
  </div>

  <!-- Game Over Overlay -->
<div id="game-over" class="hidden">
  <div class="overlay-content">
    <h2>Game Over 💧</h2>
    <p id="final-score"></p>
    <p id="final-people"></p>
    <button id="play-again-btn">Play Again</button>
    <p id="message"></p>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
