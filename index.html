<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Water Caravan</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <img src="img/cw_logo-horizontal.png" alt="charity: water logo" class="header-logo">
  </header>

  <!-- ================= TITLE ================= -->
  <h1>💧 Clean Water Caravan</h1>

  <div class="game-wrapper">
  <!-- ================= GAME INFO ================= -->
  <div id="info">
    <p id="score">Score: 0</p>
    <p id="people">People Served: 0</p>
    <p id="timer">Time: 30</p>
  </div>

  <!-- ================= GAME AREA ================= -->
  <div id="game-area"></div>

  <!-- ================= CONTROLS ================= -->
  <div id="controls">
    <button id="start-btn">Start Game</button>
    <button id="reset-btn">Reset</button>
  </div>

  <!-- ================= DIFFICULTY ================= -->
  <div id="difficulty">
    <p>Select Difficulty:</p>
    <button data-mode="easy">Easy</button>
    <button data-mode="normal" class="active">Normal</button>
    <button data-mode="hard">Hard</button>
  </div>

  <!-- ================= GAME OVER SCREEN ================= -->
  <div id="game-over" class="hidden">
    <div class="overlay-content">
      <h2>Game Over 💧</h2>
      <p id="final-score"></p>
      <p id="final-people"></p>
      <button id="play-again-btn">Play Again</button>
      <p id="message"></p>
    </div>
  </div>
  </div>
    

  <!-- ================= FOOTER ================= -->
  <footer>
    <p>Learn more & support the mission of charity: water</p>
    <a href="https://www.charitywater.org/" target="_blank">Website</a> |
    <a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
  </footer>

  <!-- JS FILE -->
  <script src="script.js"></script>

</body>
</html>
